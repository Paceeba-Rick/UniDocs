<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout - UniDocs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container auth-container">
        <header>
            <img style="border-radius: 50%;" src="images/logo.jpg" alt="UniDocs Logo" class="logo">
            <h1>Logout</h1>
        </header>
        
        <div class="logout-confirmation">
            <h2>Are you sure you want to logout?</h2>
            <p>You'll need to sign in again to access your documents.</p>
            
            <div class="logout-actions">
                <a href="dashboard.html" class="btn secondary">Cancel</a>
                <a href="index.html" class="btn" id="confirmLogout">Logout</a>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
