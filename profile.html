<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - UniDocs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container dashboard-container">
        <header class="dashboard-header">
            <div class="header-left">
                <img style="border-radius: 50%;" src="images/logo.jpg" alt="UniDocs Logo" class="logo">
                <h1 style="margin-top: 10%;">UniDocs</h1>
            </div>
            <div class="header-right">
                <div class="user-profile">
                    <span>Welcome, Yakubu Paceeba</span>
                    <img src="images/profile3.jpg" alt="User" class="avatar">
                </div>
            </div>
        </header>
        
        <nav class="dashboard-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="request.html">New Request</a>
            <a href="profile.html" class="active">Profile</a>
            <a href="logout.html">Logout</a>
        </nav>
        
        <main class="profile-main">
            <h2>My Profile</h2>
            
            <div class="profile-section">
                <div class="profile-header">
                    <img src="images/profile3.jpg" alt="Profile Photo" class="profile-photo">
                    <button id="changePhotoBtn" class="btn secondary">Change Photo</button>
                </div>
                
                <form id="profileForm" class="profile-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fullName">Full Name</label>
                            <input type="text" id="fullName" value="Yakubu Paceeba" required>
                        </div>
                        <div class="form-group">
                            <label for="studentId">Student ID</label>
                            <input type="text" id="studentId" value="ST2023001" readonly>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">University Email</label>
                        <input type="email" id="email" value="YakubuPaceeba@university.edu" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="department">Department</label>
                            <select id="department" required>
                                <option value="computer_science" selected>Computer Science</option>
                                <option value="engineering">Engineering</option>
                                <option value="business">Business</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="graduationYear">Addmission Year / Graduation Year</label>
                            <select id="graduationYear" required>
                                <option value="2023">2023</option>
                                <option value="2024" selected>2024</option>
                                <option value="2025">2025</option>
                            </select>
                        </div>

                    </div>
                    
                    <h3>Change Password</h3>
                    <div class="form-group">
                        <label for="currentPassword">Current Password</label>
                        <input type="password" id="currentPassword">
                    </div>
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword">
                    </div>
                    <div class="form-group">
                        <label for="confirmNewPassword">Confirm New Password</label>
                        <input type="password" id="confirmNewPassword">
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" id="cancelBtn" class="btn secondary">Cancel</button>
                        <button type="submit" class="btn">Save Changes</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    
    <!-- Photo Upload Modal -->
    <div id="photoModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>Update Profile Photo</h3>
            <div class="file-upload">
                <input type="file" id="photoUpload" accept="image/*">
                <label for="photoUpload">
                    <img src="images/upload-icon.jpg" alt="Upload">
                    <span>Choose New Photo</span>
                </label>
                <div id="photoFileName">No file chosen</div>
            </div>
            <button id="uploadPhotoBtn" class="btn" disabled>Upload Photo</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
